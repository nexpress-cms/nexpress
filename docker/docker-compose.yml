services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nexpress
      POSTGRES_USER: nexpress
      POSTGRES_PASSWORD: nexpress
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${NEXPRESS_DB_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexpress"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: nexpress
      MINIO_ROOT_PASSWORD: nexpress123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    profiles:
      - s3

  # Mailpit — local SMTP server + browser inbox for development.
  # The framework's SmtpEmailAdapter speaks plain SMTP, so this
  # container is a drop-in replacement for Resend / SendGrid /
  # Postmark during dev: same wire protocol, same code path,
  # different destination. Open the inbox at http://localhost:8025
  # to see every email the app would have sent.
  #
  # Started by default (no `profiles:` gate) because the auth
  # flows (`/members/register`, `/members/forgot-password`)
  # silently drop their email when the SMTP env isn't configured,
  # which makes "is my code broken or did the email just not
  # arrive" a confusing thing to debug for newcomers.
  mailpit:
    image: axllent/mailpit:v1.21
    ports:
      - "${NEXPRESS_SMTP_PORT:-1025}:1025"
      - "${NEXPRESS_MAILPIT_WEB_PORT:-8025}:8025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: "true"
      MP_SMTP_AUTH_ALLOW_INSECURE: "true"

volumes:
  pgdata:
  minio-data:
