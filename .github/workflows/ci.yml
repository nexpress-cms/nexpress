name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: typecheck + build + test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # `next build` runs page-data collection at the end of the build, which
    # imports `nexpress.config.ts` and trips the Zod schema for auth.secret.
    # Provide ci-only dummy values so the build completes; nothing here
    # touches a real secret.
    env:
      NX_SECRET: ci-secret-which-is-long-enough-for-jwt-signing
      SITE_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build first so downstream `tsc --noEmit` sees sibling packages' dist/.
      - name: Build
        run: pnpm build

      - name: Typecheck (tsc --noEmit per package)
        run: pnpm typecheck

      - name: Test
        run: pnpm test

  # #275 — the critical write path (pipeline.ts at 2,185 lines and
  # everything around it) is exercised primarily by `pnpm test:integration`
  # against a real Postgres. Mock-based unit tests don't catch real schema
  # mismatches, FK violations, transaction-isolation issues, or pg-boss
  # interactions, so a green `pnpm test` was misleading. This job runs the
  # integration suite against a Postgres service container.
  integration:
    name: integration tests (Postgres)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nexpress
          POSTGRES_PASSWORD: nexpress
          POSTGRES_DB: nexpress_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nexpress"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_URL: postgres://nexpress:nexpress@localhost:5432/nexpress_test
      # Same `next build` page-data collection issue as the checks job.
      NX_SECRET: ci-secret-which-is-long-enough-for-jwt-signing
      SITE_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Integration tests
        # Sequential by design — see docs/testing.md "Behaviour".
        run: pnpm test:integration

  # Phase 23.6 — golden-path E2E coverage. Runs Playwright against
  # a built `next start` so the run shape matches production output
  # rather than dev-mode transpile. Reuses the same Postgres
  # service the integration job uses, but keeps a separate DB
  # name so an integration run leaving stale rows doesn't break
  # E2E (and vice versa).
  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nexpress
          POSTGRES_PASSWORD: nexpress
          POSTGRES_DB: nexpress_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nexpress"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://nexpress:nexpress@localhost:5432/nexpress_e2e
      NX_SECRET: e2e-secret-which-is-long-enough-for-jwt-signing
      SITE_URL: http://localhost:3001
      PLAYWRIGHT_USE_BUILD: "1"
      PLAYWRIGHT_PORT: "3001"
      CI: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @nexpress/web exec playwright install --with-deps chromium

      - name: Build
        run: pnpm build

      - name: Generate + apply DB schema
        run: |
          pnpm --filter @nexpress/web db:generate
          pnpm --filter @nexpress/web db:migrate

      - name: E2E tests
        run: pnpm --filter @nexpress/web test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7
