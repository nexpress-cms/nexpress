name: CI

# Temporarily manual-only while the repo's Actions billing is unresolved.
# Re-enable push/pull_request triggers once the account is restored — the
# rest of the workflow (install → build → typecheck → test) stays unchanged.
on:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: typecheck + build + test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build first so downstream `tsc --noEmit` sees sibling packages' dist/.
      - name: Build
        run: pnpm build

      - name: Typecheck (tsc --noEmit per package)
        run: pnpm typecheck

      - name: Test
        run: pnpm test
