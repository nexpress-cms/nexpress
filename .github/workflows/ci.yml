name: CI

# Triggers: push to main (verify the merged state) + every
# pull_request (gate merges on green). Restored alongside the npm
# publish activation so the Release workflow on `main` runs against
# pre-verified diffs — without push-time CI, a broken `main` would
# propagate to npm before anyone noticed.
#
# `paths-ignore` on push:main only — PR triggers stay unconditional
# so required-status-checks are still satisfied (a paths-ignored
# workflow run reports as "missing" rather than "passed", which
# would block the merge). Skipping push:main runs is safe because
# the PR's own CI already verified the same diff seconds earlier;
# the push:main re-run only adds value when files outside this
# ignore list changed.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - ".changeset/**"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/pull_request_template.md"
      - ".github/dependabot.yml"
      - "docs/**"
      - "LICENSE"
      - "CODE_OF_CONDUCT.md"
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: typecheck + build + test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # `next build` runs page-data collection at the end of the build, which
    # imports `nexpress.config.ts` and validates the project contract.
    # Provide ci-only values so the build completes; page-data collection
    # does not connect to this placeholder database.
    env:
      DATABASE_URL: postgres://nexpress:nexpress@localhost:5432/nexpress_build
      NP_SECRET: ci-secret-which-is-long-enough-for-jwt-signing
      SITE_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.0
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      # Build first so downstream `tsc --noEmit` sees sibling packages' dist/.
      - name: Build
        run: pnpm build

      # Runtime smoke — `apps/web/scripts/*.ts` are now typechecked
      # and linted, but tsx module-load failures can still hide
      # until execution. Keep this after `pnpm build` so the local
      # wrappers exercise the same @nexpress/app dist subpaths a
      # checked-out operator would run.
      - name: Runtime smoke — apps/web scripts load cleanly
        run: node .github/scripts/check-web-script-runtime.mjs

      - name: Typecheck (tsc --noEmit per package)
        run: pnpm typecheck

      - name: Test
        run: pnpm test

  # #275 — the critical write path (pipeline.ts at 2,185 lines and
  # everything around it) is exercised primarily by `pnpm test:integration`
  # against a real Postgres. Mock-based unit tests don't catch real schema
  # mismatches, FK violations, transaction-isolation issues, or pg-boss
  # interactions, so a green `pnpm test` was misleading. This job runs the
  # integration suite against a Postgres service container.
  integration:
    name: integration tests (Postgres)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nexpress
          POSTGRES_PASSWORD: nexpress
          POSTGRES_DB: nexpress_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nexpress"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://nexpress:nexpress@localhost:5432/nexpress_test
      TEST_DATABASE_URL: postgres://nexpress:nexpress@localhost:5432/nexpress_test
      # Same `next build` project-config validation as the checks job.
      NP_SECRET: ci-secret-which-is-long-enough-for-jwt-signing
      SITE_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.0
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Integration tests
        # Sequential by design — see docs/testing.md "Behaviour".
        run: pnpm test:integration

  # Phase 23.6 — golden-path E2E coverage. Runs Playwright against
  # a built `next start` so the run shape matches production output
  # rather than dev-mode transpile. Reuses the same Postgres
  # service the integration job uses, but keeps a separate DB
  # name so an integration run leaving stale rows doesn't break
  # E2E (and vice versa).
  #
  # Gated to pull_request + workflow_dispatch only. On push:main the
  # diff is already what the PR's E2E run exercised seconds earlier
  # — re-running the 6-7 minute Playwright suite for every merge
  # added queue pressure without catching anything new. If a future
  # merge group / squash-and-rebase changes the diff post-merge
  # enough to warrant verification, flip this back to unconditional.
  e2e:
    name: E2E (Playwright)
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nexpress
          POSTGRES_PASSWORD: nexpress
          POSTGRES_DB: nexpress_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nexpress"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://nexpress:nexpress@localhost:5432/nexpress_e2e
      NP_SECRET: e2e-secret-which-is-long-enough-for-jwt-signing
      SITE_URL: http://localhost:3001
      PLAYWRIGHT_USE_BUILD: "1"
      PLAYWRIGHT_PORT: "3001"
      CI: "1"

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.0
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @nexpress/web exec playwright install --with-deps chromium

      - name: Build
        run: pnpm build

      - name: Generate + apply DB schema
        run: |
          pnpm --filter @nexpress/web db:generate
          pnpm --filter @nexpress/web db:migrate

      - name: E2E tests
        run: pnpm --filter @nexpress/web test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

  # #705 — scaffold smoke. After #702-#704 the scaffold no longer
  # duplicates apps/web's logic; it mirrors apps/web via the
  # @nexpress/app subpath exports + a frozen `templates/snapshot/`
  # copy. The unit tests on getProjectFiles verify the file map
  # is well-formed, but nothing catches the next-tier regression:
  # an actual scaffold of `node dist/index.js my-app` failing to
  # typecheck (broken stub, missing dep, snapshot drift).
  #
  # The smoke runs end-to-end against a temp project rooted in
  # `$RUNNER_TEMP` (NOT inside the monorepo workspace). The trick:
  # pack every @nexpress/* package with `pnpm pack`, rewrite the
  # scaffold's package.json to use `file:` tarball paths, then
  # `pnpm install --ignore-workspace` in the scaffold dir. This
  # keeps the smoke fully isolated — the monorepo's pnpm-lock.yaml
  # never mutates, the scaffold doesn't accidentally pick up the
  # workspace's deps, and the test exercises the same install
  # path a real `npx create-nexpress` user would (modulo registry
  # vs. tarball, which is the only safe difference until the
  # packages are published).
  scaffold-smoke:
    name: scaffold smoke (fresh scaffold journey)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      DATABASE_URL: postgres://nexpress:nexpress@localhost:5432/nexpress_build
      NP_SECRET: ci-secret-which-is-long-enough-for-jwt-signing
      SITE_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.0
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Guard against the canonical drift bug: `apps/web/src/app/<route>`
      # gets a new route file, but whoever added it forgot to run
      # `pnpm --filter create-nexpress run sync-snapshot`. Result is a
      # scaffolded site that 404s the new URL even though the apps/web
      # reference renders it fine. The check is non-mutating and uses the
      # same snapshot-sync module as the local unit test and sync command.
      - name: Verify scaffold snapshot is in sync with apps/web
        run: pnpm --filter create-nexpress run check-snapshot

      - name: Build (CLI + every package the scaffold pulls in)
        run: pnpm build

      # Pack every @nexpress/* workspace package so the scaffold's
      # direct AND transitive deps all resolve to local tarballs
      # (the link script's `pnpm.overrides` redirects every packed
      # name). Manual enumeration drifted: PR #727 added 11 plugin
      # deps to @nexpress/app without updating this listing, so
      # post-publish CI on main hit ERR_PNPM_NO_MATCHING_VERSION
      # because pnpm fell through to npm registry for un-packed
      # plugin tarballs. Auto-discovery via `pnpm m ls` removes the
      # listing as a drift surface.
      - name: Pack workspace packages as tarballs
        run: |
          mkdir -p "$RUNNER_TEMP/tarballs"
          pnpm m ls --json --depth=-1 \
            | jq -r '.[] | select(.name and (.name | test("^@nexpress/"))) | .path' \
            | while read -r dir; do
                (cd "$dir" && pnpm pack --pack-destination "$RUNNER_TEMP/tarballs")
              done
          ls "$RUNNER_TEMP/tarballs"

      - name: Scaffold a fresh project (outside the workspace)
        run: |
          mkdir -p "$RUNNER_TEMP/scaffold"
          cd "$RUNNER_TEMP/scaffold"
          node "$GITHUB_WORKSPACE/packages/cli/dist/index.js" \
            smoke-app --yes --no-docker --local

      - name: Rewrite scaffold deps to use packed tarballs
        run: |
          node "$GITHUB_WORKSPACE/.github/scripts/link-scaffold-tarballs.mjs" \
            "$RUNNER_TEMP/scaffold/smoke-app" \
            "$RUNNER_TEMP/tarballs"

      - name: Install + typecheck (isolated from monorepo lockfile)
        run: |
          cd "$RUNNER_TEMP/scaffold/smoke-app"
          pnpm install --ignore-workspace
          pnpm typecheck
          pnpm exec tsc --showConfig \
            | jq -e '.files | any(. == "./src/nexpress.config.ts")' >/dev/null

      - name: Build generated scaffold
        run: |
          cd "$RUNNER_TEMP/scaffold/smoke-app"
          NP_SECRET=ci-secret-which-is-long-enough-for-jwt-signing-tests \
            SITE_URL=http://localhost:3000 \
            pnpm build

      - name: Extension scaffold smoke — generated package lifecycle
        run: |
          node "$GITHUB_WORKSPACE/.github/scripts/check-extension-scaffold-matrix.mjs" \
            "$RUNNER_TEMP/scaffold/smoke-app"

      # Runtime smoke — typecheck passes for whole classes of bugs that
      # only manifest at module load (the canonical case: `@nexpress/app`
      # dist chunks importing `@/lib/bootstrap`, which `tsx` can't
      # resolve in node_modules → `ERR_MODULE_NOT_FOUND` only when the
      # script actually runs). For each tsx-launched script in the
      # scaffold, do a short-timeout run with fake env vars and assert
      # the failure is a downstream DB / migration error, NOT a
      # module-resolution failure. The scripts all exit non-zero
      # without a real DB — that's expected; what we're catching is
      # ERR_MODULE_NOT_FOUND, ERR_PACKAGE_PATH_NOT_EXPORTED, and
      # similar import-time crashes.
      - name: Runtime smoke — tsx scripts load cleanly
        run: |
          cd "$RUNNER_TEMP/scaffold/smoke-app"
          # Generate the schema first so `pnpm seed:content` / `worker`
          # advance past the "no matching generated Drizzle table" gate
          # and reach the actual bootstrap chain we care about.
          DATABASE_URL=postgres://nexpress:nexpress@127.0.0.1:55432/ci_unreachable \
            NP_SECRET=ci-secret-which-is-long-enough-for-jwt-signing-tests \
            SITE_URL=http://localhost:3000 \
            pnpm exec tsx scripts/generate-schema.ts || true

          fail=0
          for script in seed-admin.ts seed-content.ts worker.ts doctor.ts dev-notice.ts; do
            if [ ! -f "scripts/$script" ]; then continue; fi
            log="$RUNNER_TEMP/smoke-$script.log"
            # `127.0.0.1:55432` is a guaranteed-closed port — the
            # scripts will fail to connect, but only AFTER they've
            # finished module-loading. That's the window we test.
            # `</dev/null` is what protects against scripts that
            # read stdin (seed-admin's readline) — the EOF makes them
            # bail fast. The `--help` argument the scripts don't
            # honor isn't needed; the timeout cuts off any HTTP
            # listener (setup-server isn't in the list anyway).
            DATABASE_URL=postgres://nexpress:nexpress@127.0.0.1:55432/ci_unreachable \
              NP_SECRET=ci-secret-which-is-long-enough-for-jwt-signing-tests \
              SITE_URL=http://localhost:3000 \
              timeout 20 pnpm exec tsx "scripts/$script" </dev/null > "$log" 2>&1 || true

            # Anything that's a resolver crash before user code runs.
            if grep -qE 'ERR_MODULE_NOT_FOUND|ERR_PACKAGE_PATH_NOT_EXPORTED|Cannot find package|Cannot find module' "$log"; then
              echo "::error::scripts/$script crashed at module load:"
              tail -20 "$log"
              fail=1
            else
              echo "✓ scripts/$script module-loaded cleanly"
            fi
          done
          exit $fail

      - name: Journey smoke — deploy readiness commands
        run: |
          node "$GITHUB_WORKSPACE/.github/scripts/check-scaffold-journey.mjs" \
            "$RUNNER_TEMP/scaffold/smoke-app"

      - name: Verify monorepo lockfile is untouched
        run: |
          if ! git diff --quiet pnpm-lock.yaml; then
            echo "::error::scaffold-smoke mutated pnpm-lock.yaml — isolation broke"
            git diff pnpm-lock.yaml | head -40
            exit 1
          fi
          echo "✓ pnpm-lock.yaml clean"
