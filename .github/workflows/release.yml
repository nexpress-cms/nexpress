name: Release

# Triggered by a push to `main` (typically the merge of a "Version
# Packages" PR generated by `pnpm version`). The Changesets action
# picks up pending changesets, opens / updates a "Version Packages"
# PR if any are queued, and publishes when that PR lands. Manual
# `workflow_dispatch` is kept as an escape hatch.
#
# Provenance: `npm publish --provenance` requires the workflow to
# run in a public repo with `id-token: write`. NPM uses Sigstore /
# OIDC to sign the package metadata so installers can verify the
# tarball was built from this exact commit. See
# https://docs.npmjs.com/generating-provenance-statements.
#
# Current mode: version-PR only. See docs/releasing.md for the
# checklist to enable npm publishing for the first public cut.
# Pre-public-release cost saver: see ci.yml. Same dispatch-only mode
# until the repo flips public. Restore the `push: main` trigger
# alongside ci.yml's restoration.
on:
  workflow_dispatch:
  # push:
  #   branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write       # changesets bot pushes the "Version Packages" PR
  pull-requests: write  # … and opens / updates it
  id-token: write       # npm provenance attestation

jobs:
  release:
    name: Version + publish
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # `pnpm build` ends with `next build`'s page-data collection step,
    # which imports `nexpress.config.ts` and trips the Zod schema for
    # auth.secret / site.url. ci.yml supplies these for its own jobs
    # (#394); release needs the same shim, otherwise every push to
    # main fails before the changesets action even runs.
    env:
      NX_SECRET: ci-secret-which-is-long-enough-for-jwt-signing
      SITE_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4
        with:
          # changesets/action diffs against the base branch.
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          # Required for `npm publish --provenance` to authenticate.
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      # Sanity gate: refuse to publish a tarball that doesn't typecheck.
      - name: Typecheck
        run: pnpm typecheck

      - name: Create Release Pull Request
        uses: changesets/action@v1
        with:
          # `pnpm version` consumes pending .changeset/ entries → bumps
          # versions + writes CHANGELOG.md. The action opens / updates
          # the "Version Packages" PR with this diff.
          #
          # `publish` is intentionally NOT wired yet. The 0.1.0 cut is
          # gated behind an explicit decision (npm scope ownership +
          # NPM_TOKEN provisioning); until then changesets/action would
          # see every package as "unpublished" and try to publish on
          # every push to main, failing because no token is configured.
          # Re-add `publish: pnpm release` plus the npm secrets when
          # 0.1.0 ships.
          version: pnpm version
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
