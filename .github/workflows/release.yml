name: Release

# Triggered by a push to `main` (typically the merge of a "Version
# Packages" PR generated by `pnpm version`). The Changesets action
# picks up pending changesets, opens / updates a "Version Packages"
# PR if any are queued, and publishes when that PR lands. Manual
# `workflow_dispatch` is kept as an escape hatch.
#
# Provenance: `npm publish --provenance` requires the workflow to
# run in a public repo with `id-token: write`. NPM uses Sigstore /
# OIDC to sign the package metadata so installers can verify the
# tarball was built from this exact commit. See
# https://docs.npmjs.com/generating-provenance-statements.
#
# Current mode: version-PR + npm publish via **Trusted Publishing**
# (OIDC). The `Create Release Pull Request or Publish` step below
# picks up pending `.changeset/` entries on every `push: main` —
# if any are queued and the diff isn't already a Version Packages
# PR, the action opens / updates that PR. When that PR merges
# (no remaining changesets), the same step runs `pnpm release`
# to validate, publish, verify registry metadata, and tag the release.
#
# **No NPM_TOKEN.** Auth uses GitHub's OIDC: the workflow's
# `id-token: write` permission lets npm exchange the short-lived
# OIDC token for publish rights, gated by each package's Trusted
# Publisher config on npmjs.com (which pins this exact repo +
# workflow). Sigstore provenance attaches automatically via
# `NPM_CONFIG_PROVENANCE: "true"`.
#
# **First-publish prerequisite.** A package must either (a)
# already exist on npm with Trusted Publishers configured for
# this workflow, OR (b) be published once via local
# `pnpm publish --access public` with 2FA, then have its TP
# config added on npmjs.com afterwards. See
# `docs/releasing.md` § "Trusted Publisher setup" for the
# step-by-step. Never replace that bootstrap command with direct
# `npm publish`: npm does not rewrite pnpm's `workspace:*`
# dependencies and will upload an uninstallable manifest.
on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write # changesets bot pushes the "Version Packages" PR
  pull-requests: write # … and opens / updates it
  actions: write # dispatch CI for GITHUB_TOKEN-created Version PRs
  statuses: write # mirror required CI jobs onto the Version PR commit
  id-token: write # npm provenance attestation

jobs:
  release:
    name: Version + publish
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # `pnpm build` ends with `next build`'s page-data collection step,
    # which imports `nexpress.config.ts` and validates the project contract.
    # ci.yml supplies build-only config for its own jobs (#394); release
    # needs the same shim, otherwise every push to main fails before the
    # changesets action even runs.
    env:
      DATABASE_URL: postgres://nexpress:nexpress@localhost:5432/nexpress_build
      NP_SECRET: ci-secret-which-is-long-enough-for-jwt-signing
      SITE_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v7
        with:
          # changesets/action diffs against the base branch.
          fetch-depth: 0

      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.0
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          # Required for `npm publish --provenance` to authenticate.
          registry-url: https://registry.npmjs.org

      # npm Trusted Publishing (OIDC) requires npm >= 11.5.1; Node 22
      # ships with npm 10.x by default. Without this bump, every
      # `npm publish` call inside `changeset publish` exchanges the
      # OIDC token for nothing, and npm responds with a misleading
      # E404 ("not in this registry") for every package — the
      # symptom we hit on the v0.2.0 release run.
      #
      # Pinned to an exact version, not `@latest`, to dodge the
      # self-upgrade race that left npm with a broken `arborist`
      # require chain ("Cannot find module 'promise-retry'") on the
      # 0.1.1 attempt. Bump this manually when npm ships relevant TP
      # or provenance fixes.
      - name: Upgrade npm for Trusted Publishing support
        run: npm install -g npm@11.15.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          # `pnpm run version` invokes the `version` script in
          # root package.json (= repository release-invariant tests followed
          # by `changeset version`). MUST be
          # `pnpm run version`, NOT `pnpm version` — bare `version`
          # is a pnpm built-in (alias for npm's version subcommand)
          # that shadows package.json scripts of the same name.
          # With bare `pnpm version` the built-in fires, prints the
          # current root version, and skips the changeset bump
          # entirely — leaving no diff for the PR and the action
          # erroring "No commits between main and
          # changeset-release/main". Same applies to `pnpm run
          # release` below.
          version: pnpm run version
          # `pnpm run release` first checks whether any workspace version is
          # unpublished. A no-op main push exits quickly; a real release runs
          # repository tests, build, typecheck, publish, registry verification,
          # and only then creates the release tag.
          # changesets/action only calls this when no changesets are
          # queued (i.e. the Version Packages PR has just merged), so
          # publish doesn't fire mid-track. Auth via Trusted Publishing:
          # the `id-token: write` permission lets npm exchange the
          # workflow's OIDC token for publish rights, gated by each
          # package's TP config on npmjs.com (nexpress-cms/nexpress +
          # release.yml). `NPM_CONFIG_PROVENANCE: "true"` attaches a
          # Sigstore provenance attestation to every tarball.
          publish: pnpm run release
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
          # GitHub Releases generate ~30 entries per Version PR merge
          # (one per package in the `fixed` group) — the Releases page
          # becomes incomprehensible noise for a repo where every
          # publish is a synchronized fixed-group bump. Git tags +
          # CHANGELOG.md per package + the Version PR's body already
          # carry the per-package narrative; the GitHub Releases page
          # was duplicating that without adding signal. Disable
          # release creation while keeping tags + npm publish intact.
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"

      # `changesets/action` uses `GITHUB_TOKEN`, and GitHub suppresses
      # automatic workflow triggers for commits created with that token.
      # Without this bridge, the Version PR can sit with an empty
      # statusCheckRollup even though the branch is mergeable by content,
      # forcing an admin bypass. Dispatch CI manually and mirror the
      # required job conclusions as commit statuses with the exact names
      # the main-branch ruleset requires.
      - name: Bridge Version PR CI into required checks
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION_PR_NUMBER: ${{ steps.changesets.outputs.pullRequestNumber }}
          VERSION_PR_BRANCH: changeset-release/main
          VERSION_PR_BASE: main
          CI_WORKFLOW_FILE: ci.yml
        run: node scripts/bridge-version-pr-ci.mjs

      # Race guard: the Version PR's merge commit (titled
      # `chore(release): version packages`) is supposed to trigger
      # `pnpm run release` (= publish to npm). But if a feature PR
      # adds a new `.changeset/*.md` AFTER the Version PR was last
      # rebased and the operator admin-merges the Version PR before
      # changesets/action has time to fold the new entry in, the
      # merge commit lands at a stale HEAD that doesn't include the
      # new changeset's deletion. main now has a leftover
      # `.changeset/*.md`; `changesets/action` on this run sees
      # "still has changesets" and opens a *new* Version PR instead
      # of publishing. The current run reports success, operator
      # thinks they shipped, npm is unchanged.
      #
      # Originally this check ALSO required
      # `steps.changesets.outputs.published != 'true'`, but
      # changesets/action's stdout parser doesn't always recognise
      # OUR publish output as a publish event (we use a custom
      # release wrapper around Changesets, verification, and tagging,
      # which breaks the parser's
      # expected "🦋 info npm info ..." stream). When publish in
      # fact succeeds but `published` comes back not-`true`, the
      # detector used to fail the workflow despite a clean ship —
      # the 0.3.6 release on 2026-05-20 hit exactly this false
      # alarm. The orphan-changeset check below is the actual
      # race signal; drop the unreliable `outputs.published`
      # dependency and key only on the presence of leftover files.
      - name: Fail when Version PR merge left an orphan changeset (race detector)
        # `startsWith` (not `contains`) on head_commit.message because
        # the Version PR squash commit title IS the entire first line
        # (`chore(release): version packages (#NNN)`), but a regular
        # feature commit's BODY could mention that string in passing
        # (e.g., explaining a release-flow fix) and trip the detector.
        # startsWith on the title-prefix avoids that false positive.
        if: |
          github.event_name == 'push' &&
          startsWith(github.event.head_commit.message, 'chore(release): version packages')
        run: |
          orphans=$(ls .changeset/ 2>/dev/null | grep -vE '^(README\.md|config\.json)$' || true)
          if [ -z "$orphans" ]; then
            echo "✓ No orphan .changeset files at this commit — publish completed cleanly."
            exit 0
          fi
          echo "::error::Version PR merge landed at a stale HEAD — orphan changesets on main blocked publish."
          echo ""
          echo "Orphan .changeset files (everything besides README.md / config.json):"
          echo "$orphans" | sed 's/^/  /'
          echo ""
          echo "Recovery: either merge the freshly-rebased Version PR that just opened,"
          echo "or pull the orphan changeset into a follow-up PR and merge that Version PR."
          exit 1
